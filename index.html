<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>SWS Production Calendar</title>
<meta name="description" content="Summit West Signs production due-date calendar." />

<link rel="manifest" href="manifest.json" />
<!-- ?v= busts sticky browser favicon caches — bump when the icon artwork changes -->
<link rel="icon" href="icons/favicon.png?v=2" />
<link rel="apple-touch-icon" href="icons/icon-180.png?v=2" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#1b448b" />

<!-- ?v= on every local script/stylesheet below busts the CDN/browser cache
     on each deploy — keep it in sync with version.json's version on every
     push (see README "Config" section). -->
<link rel="stylesheet" href="styles/tokens.css?v=2026.07.16.2" />
<link rel="stylesheet" href="styles/layout.css?v=2026.07.16.5" />
<link rel="stylesheet" href="styles/calendar.css?v=2026.07.16.2" />
<link rel="stylesheet" href="styles/job-card.css?v=2026.07.16.2" />
<link rel="stylesheet" href="styles/job-detail.css?v=2026.07.16.4" />
<link rel="stylesheet" href="styles/user-mgmt.css?v=2026.07.16.4" />
<link rel="stylesheet" href="styles/dept-assign.css?v=2026.07.16.2" />
<link rel="stylesheet" href="styles/stats-bar.css?v=2026.07.16.4" />
<link rel="stylesheet" href="styles/toast.css?v=2026.07.16.2" />
</head>
<body>

<div id="pin-screen">
  <img class="pin-brand-mark" src="icons/brand-mark-160.png" alt="" />
  <div class="pin-logo"><span>SWS</span> Production Calendar</div>
  <div class="pin-card">
    <h1>Enter PIN</h1>
    <div class="pin-subtitle">Enter your 4-digit PIN to continue</div>
    <div class="pin-dots">
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="pin-pad">
      <button data-digit="1">1</button>
      <button data-digit="2">2</button>
      <button data-digit="3">3</button>
      <button data-digit="4">4</button>
      <button data-digit="5">5</button>
      <button data-digit="6">6</button>
      <button data-digit="7">7</button>
      <button data-digit="8">8</button>
      <button data-digit="9">9</button>
      <span></span>
      <button data-digit="0">0</button>
      <button id="pin-del" class="pin-del" aria-label="Delete digit">⌫</button>
    </div>
    <div id="pin-error"></div>
  </div>
</div>

<div id="app">
  <header class="app-header">
    <div class="brand-row">
      <div class="brand">
        <img class="brand-mark" src="icons/brand-mark-96.png" alt="" />
        <div class="brand-text">
          <span class="brand-name">Summit West Signs</span>
          <span class="brand-sub">Production Calendar</span>
        </div>
      </div>
      <div class="header-user-cluster">
        <span id="dept-badge" class="dept-badge" hidden></span>
        <div id="user-badge"></div>
        <button class="hdr-btn settings-btn" id="settings-btn" title="Settings">⚙</button>
      </div>
    </div>
    <div class="toolbar-row">
      <div class="toolbar-left">
        <button class="hdr-btn" id="refresh-btn">↻ Refresh</button>
        <span id="last-updated"></span>
        <span id="header-count"></span>
      </div>
      <button class="hdr-btn" id="view-btn-assign" hidden>Jobs to Assign</button>
    </div>
    <div class="nav-row">
      <nav class="date-nav" aria-label="Date navigation">
        <button id="nav-prev" aria-label="Previous">‹</button>
        <button id="nav-today" class="today-btn">Today</button>
        <button id="nav-next" aria-label="Next">›</button>
        <span id="current-range" class="current-range"></span>
      </nav>
      <div class="view-switcher" role="tablist">
        <button data-view="month">Month</button>
        <button data-view="week">Week</button>
        <button data-view="schedule">Schedule</button>
      </div>
    </div>
  </header>

  <div id="update-banner">
    <span>🔄 A new version is available</span>
    <button id="update-reload-btn">Update now</button>
  </div>

  <div id="stats-bar"></div>

  <main class="view-area" id="view-area"></main>
</div>

<div id="toast-stack" aria-live="polite"></div>

<div class="settings-backdrop" id="settings-backdrop"></div>
<div class="settings-panel" id="settings-panel">
  <div class="settings-header">
    <span>Settings</span>
    <button class="settings-close-btn" id="settings-close-btn" title="Close">✕</button>
  </div>
  <div class="settings-row">
    <span>Version</span>
    <span id="settings-version-text"></span>
  </div>
  <div class="settings-row">
    <span>Text size</span>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoom-out-btn">−</button>
      <span class="zoom-label" id="zoom-label">100%</span>
      <button class="zoom-btn" id="zoom-in-btn">+</button>
      <button class="zoom-reset-btn" id="zoom-reset-btn">Reset</button>
    </div>
  </div>
  <div class="settings-row my-account-row">
    <span>My Account</span>
  </div>
  <div class="my-account-fields">
    <input type="text" id="my-account-name" placeholder="Name" />
    <input type="text" id="my-account-pin" placeholder="PIN" inputmode="numeric" maxlength="4" />
  </div>
  <button class="settings-action" id="my-account-save-btn">Save my info</button>
  <div id="my-account-hint" class="notes-save-hint"></div>
  <button class="settings-action" id="settings-check-btn">Check for updates</button>
  <button class="settings-action" id="settings-usermgmt-btn" hidden>User Management</button>
  <button class="settings-action danger" id="settings-signout-btn">Sign out</button>
</div>

<div id="job-detail-overlay">
  <section class="job-detail-panel" aria-label="Job details">
    <div class="job-detail-header">
      <div>
        <h2 id="job-detail-title"></h2>
        <div id="job-detail-meta" class="job-detail-meta"></div>
      </div>
      <button id="job-detail-close" class="job-detail-close" aria-label="Close">&times;</button>
    </div>
    <div class="job-detail-body">
      <label class="job-detail-complete-toggle" id="job-detail-complete-row">
        <input type="checkbox" id="job-detail-complete" />
        Mark job complete
      </label>
      <div id="completed-info" class="completed-info"></div>

      <div class="job-detail-section">
        <h3>Project Notes</h3>
        <textarea id="job-detail-notes" class="notes-textarea" placeholder="Add project notes…"></textarea>
        <div id="notes-save-hint" class="notes-save-hint"></div>
      </div>

      <div id="job-detail-departments" class="job-detail-section" hidden>
        <h3>Departments</h3>
        <div id="job-detail-dept-list" class="dept-assign-list"></div>
      </div>

      <div id="due-date-editor" class="job-detail-section" hidden>
        <button class="settings-action" id="due-date-edit-btn">Edit due date</button>
        <div id="due-date-edit-form" class="due-date-edit-form" hidden>
          <input type="date" id="due-date-input" />
          <div class="due-date-edit-actions">
            <button class="settings-action" id="due-date-cancel-btn">Cancel</button>
            <button class="settings-action" id="due-date-reset-btn">Reset to auto</button>
            <button class="settings-action primary" id="due-date-save-btn">Save</button>
          </div>
          <div id="due-date-edit-hint" class="notes-save-hint"></div>
        </div>
      </div>
    </div>
  </section>
</div>

<div id="user-mgmt-overlay">
  <section class="user-mgmt-panel" aria-label="User management">
    <div class="user-mgmt-header">
      <h2>User Management</h2>
      <button id="user-mgmt-close" class="job-detail-close" aria-label="Close">&times;</button>
    </div>
    <div class="user-mgmt-body">
      <div class="user-mgmt-add">
        <input type="text" id="user-add-name" placeholder="Name" />
        <select id="user-add-dept"></select>
        <input type="text" id="user-add-pin" placeholder="PIN" inputmode="numeric" maxlength="4" />
        <button id="user-add-btn" class="settings-action primary">Add user</button>
        <div id="user-add-hint" class="notes-save-hint"></div>
      </div>
      <div class="user-mgmt-list-header">
        <span>Name</span><span>Department</span><span>PIN</span><span></span>
      </div>
      <div id="user-mgmt-list" class="user-mgmt-list"></div>
    </div>
  </section>
</div>

<script type="module" src="js/app.js?v=2026.07.16.4"></script>
</body>
</html>
