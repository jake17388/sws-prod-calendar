<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SWS Production Calendar</title>
<meta name="description" content="Summit West Signs production due-date calendar." />

<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/favicon.png" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#1b448b" />

<link rel="stylesheet" href="styles/tokens.css" />
<link rel="stylesheet" href="styles/layout.css" />
<link rel="stylesheet" href="styles/calendar.css" />
<link rel="stylesheet" href="styles/job-card.css" />
<link rel="stylesheet" href="styles/job-detail.css" />
</head>
<body>

<div id="pin-screen">
  <h1>SWS Production Calendar</h1>
  <div class="pin-dots">
    <span></span><span></span><span></span><span></span>
  </div>
  <div id="pin-error"></div>
  <div class="pin-pad">
    <button data-digit="1">1</button>
    <button data-digit="2">2</button>
    <button data-digit="3">3</button>
    <button data-digit="4">4</button>
    <button data-digit="5">5</button>
    <button data-digit="6">6</button>
    <button data-digit="7">7</button>
    <button data-digit="8">8</button>
    <button data-digit="9">9</button>
    <span></span>
    <button data-digit="0">0</button>
    <button id="pin-del" class="pin-del" aria-label="Delete digit">⌫</button>
  </div>
</div>

<div id="app">
  <div id="update-banner">
    <span>A new version is available.</span>
    <button id="update-reload-btn">Reload</button>
  </div>

  <header class="app-header">
    <h1>Production Calendar</h1>
    <nav class="date-nav" aria-label="Date navigation">
      <button id="nav-prev" aria-label="Previous">‹</button>
      <button id="nav-today" class="today-btn">Today</button>
      <button id="nav-next" aria-label="Next">›</button>
      <span id="current-range" class="current-range"></span>
    </nav>
    <div class="view-switcher" role="tablist">
      <button data-view="month">Month</button>
      <button data-view="week">Week</button>
      <button data-view="schedule">Schedule</button>
    </div>
    <div class="user-badge">
      <span id="user-name"></span>
      <button id="sign-out-btn">Sign out</button>
    </div>
  </header>

  <main class="view-area" id="view-area"></main>
</div>

<div id="job-detail-overlay">
  <section class="job-detail-panel" aria-label="Job details">
    <div class="job-detail-header">
      <div>
        <h2 id="job-detail-title"></h2>
        <div id="job-detail-meta" class="job-detail-meta"></div>
      </div>
      <button id="job-detail-close" class="job-detail-close" aria-label="Close">&times;</button>
    </div>
    <div class="job-detail-body">
      <label class="job-detail-complete-toggle">
        <input type="checkbox" id="job-detail-complete" />
        Mark job complete
      </label>

      <div class="job-detail-section">
        <h3>Notes</h3>
        <textarea id="job-detail-notes" class="notes-textarea" placeholder="Add production notes…"></textarea>
        <div id="notes-save-hint" class="notes-save-hint"></div>
      </div>

      <div class="job-detail-section">
        <h3>Checklist</h3>
        <div class="progress-slot"></div>
        <div id="checklist-items" class="checklist"></div>
        <div class="checklist-add">
          <input type="text" id="checklist-add-input" placeholder="Add item…" />
          <button id="checklist-add-btn">Add</button>
        </div>
      </div>
    </div>
  </section>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
