name: Deploy to Apps Script

on:
  push:
    branches: [main]
    paths:
      - 'Code.js'
      - 'appsscript.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        run: echo '${{ secrets.CLASP_TOKEN }}' > ~/.clasprc.json

      - name: Push to Apps Script
        run: clasp push --force

      # clasp push only updates source; the live /exec URL serves a versioned
      # deployment that must be re-pointed at a new version each time
      - name: Deploy new version to live web app
        run: clasp deploy -i ${{ secrets.CLASP_DEPLOYMENT_ID }} -d "CI deploy ${GITHUB_SHA::7}"
